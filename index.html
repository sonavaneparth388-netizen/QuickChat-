<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickChat - SMS Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/style.css">

    <style>
        /* Agar style.css bilkul nahi milti, toh yeh backup styling website ko tootne se bachayegi */
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --background: #f9fafb;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #4b5563;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-main);
            text-align: center;
        }
        h2 {
            font-size: 18px;
            font-weight: 600;
            margin-top: 30px;
            margin-bottom: 16px;
            color: var(--text-muted);
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 8px;
        }
        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .btn {
            background-color: #f3f4f6;
            color: #1f2937;
            border: 1px solid #e5e7eb;
            padding: 12px 16px;
            border-radius: 10px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .btn:hover {
            background-color: #e5e7eb;
            transform: translateY(-1px);
        }
        .btn-custom {
            grid-column: span 2;
            background-color: var(--primary);
            color: white;
            border: none;
        }
        .btn-custom:hover {
            background-color: var(--primary-hover);
        }
        .contacts-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .contact-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f3f4f6;
        }
        .contact-info .name {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-main);
        }
        .contact-info .phone {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .btn-add-more {
            width: 100%;
            margin-top: 16px;
            background-color: transparent;
            border: 2px dashed #d1d5db;
            color: var(--text-muted);
        }
        .btn-add-more:hover {
            background-color: #f9fafb;
            border-color: #9ca3af;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>QuickChat</h1>
        
        <div class="actions-grid">
            <button class="btn" onclick="sendSMS('reach_office')">I reach at office</button>
            <button class="btn" onclick="sendSMS('left_office')">I left from office</button>
            <button class="btn" onclick="sendSMS('call_urgent')">Call me urgent</button>
            <button class="btn class-custom btn-custom" onclick="sendSMS('custom')">Custom Message</button>
        </div>

        <h2>Your Contacts</h2>
        <ul class="contacts-list" id="contacts-container">
            </ul>

        <button class="btn btn-add-more">+ Add More</button>
    </div>

    <script src="/static/script.js"></script>
    <script src="/script.js"></script>

    <script>
        // Inline JavaScript Backup - Agar script.js load na ho toh yeh logic handles karega
        async function loadContacts() {
            try {
                // Fetch contacts directly from your app server
                const response = await fetch('/static/contacts.json').catch(() => fetch('/contacts.json'));
                if (!response.ok) {
                    // Fallback static list agar file reading mein issues ho
                    document.getElementById('contacts-container').innerHTML = `
                        <li class="contact-item"><div class="contact-info"><div class="name">Mom</div><div class="phone">+91 9699717124</div></div></li>
                        <li class="contact-item"><div class="contact-info"><div class="name">Dad</div><div class="phone">+91 9011594545</div></div></li>
                    `;
                    return;
                }
                const contacts = await response.json();
                const container = document.getElementById('contacts-container');
                container.innerHTML = '';
                contacts.forEach(c => {
                    container.innerHTML += `
                        <li class="contact-item">
                            <div class="contact-info">
                                <div class="name">${c.name}</div>
                                <div class="phone">${c.phone}</div>
                            </div>
                        </li>`;
                });
            } catch (e) {
                console.log("Using default fallback contacts view");
            }
        }

        async function sendSMS(actionKey) {
            let actionData = actionKey;
            if (actionKey === 'custom') {
                const msg = prompt("Enter your custom alert message:");
                if (!msg) return;
                actionData = msg;
            }

            // Button alert state handling
            alert(`Sending broadcast alert for: "${actionKey.replace('_', ' ')}"`);

            try {
                const response = await fetch('/send-sms', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: actionData })
                });
                const result = await response.json();
                if (result.success) {
                    alert("✅ Alert broadcast sent successfully to all numbers!");
                } else {
                    alert("❌ Failed to dispatch payload: " + (result.error || "Unknown Error"));
                }
            } catch (err) {
                alert("❌ Connection Error: " + err.message);
            }
        }

        // On Load initialization
        window.onload = loadContacts;
    </script>
</body>
</html>
